<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Ramassage Débarras Déchets | Montréal</title>
  <meta name="description" content="Ramassage Débarras Déchets à Montréal. Meubles, électros, construction, recyclage. Rapide • Fiable • Abordable. Soumission gratuite 514-446-4684." />
  <meta name="theme-color" content="#22c55e" />
  <style>
    :root{--bg1:#061022;--bg2:#091a2f;--line:rgba(255,255,255,.14);--text:#e5e7eb;--muted:#b6c2d0;--green:#22c55e;--green2:#16a34a;--r:22px;--shadow:0 18px 60px rgba(0,0,0,.45)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);
      background:radial-gradient(900px 500px at 10% -10%, rgba(34,197,94,.30), transparent 60%),
               radial-gradient(900px 520px at 105% 10%, rgba(59,130,246,.22), transparent 60%),
               linear-gradient(180deg,var(--bg1),var(--bg2))}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .top{position:sticky;top:0;z-index:10;background:rgba(6,16,34,.70);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.10)}
    .topin{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{font-weight:1000}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.25)}
    .btn.green{background:linear-gradient(180deg, rgba(34,197,94,.98), rgba(22,163,74,.98));border-color:rgba(34,197,94,.35)}
    .card{margin-top:16px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
    .posterWrap{padding:14px}
    .poster{width:100%;display:block;border-radius:18px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.15)}
    .ctaRow{display:flex;gap:10px;flex-wrap:wrap;padding:0 14px 14px}
    .ctaRow .btn{flex:1;min-width:170px}
    .section{padding:16px 14px}
    h2{margin:0 0 10px;font-size:22px}
    .sub{margin:0;color:var(--muted);font-weight:800;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
    @media(max-width:650px){.grid{grid-template-columns:1fr}}
    .mini{padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.14)}
    .mini b{display:block;margin-bottom:6px}
    .mini span{color:var(--muted);font-weight:800;font-size:13px}
    label{font-weight:900;font-size:12px}
    input,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(2,6,23,.72);color:var(--text);outline:none;margin-top:6px}
    textarea{min-height:110px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:520px){.row{grid-template-columns:1fr}}
    .footer{text-align:center;padding:18px 10px 26px;color:var(--muted);font-weight:800;font-size:13px;border-top:1px solid rgba(255,255,255,.10)}
  </style>
</head>
<body>

<div class="top">
  <div class="wrap topin">
    <div class="brand">Ramassage Débarras Déchets</div>
    <a class="btn green" href="tel:15144464684">📞 514-446-4684</a>
  </div>
</div>

<div class="wrap">

  <div class="card">
    <div class="posterWrap">
      <img class="poster" src="file_0000000059ec71f59d678cb7c92e591d (1).png" alt="Ramassage Débarras Déchets" />
    </div>
    <div class="ctaRow">
      <a class="btn green" href="tel:15144464684">Appeler maintenant</a>
      <a class="btn" href="#contact">Soumission gratuite</a>
    </div>
  </div>

  <div class="card section" id="contact">
    <h2>Soumission gratuite</h2>
    <p class="sub">Laissez vos infos — on vous rappelle rapidement.</p>

    <form name="soumission" method="POST" data-netlify="true" style="margin-top:12px">
      <input type="hidden" name="form-name" value="soumission" />

      <div class="row">
        <div><label>Nom</label><input name="name" required /></div>
        <div><label>Téléphone</label><input name="phone" required /></div>
      </div>

      <div class="row" style="margin-top:10px">
        <div><label>Adresse / secteur</label><input name="address" required /></div>
        <div><label>Type</label><input name="type" placeholder="Meubles, électros, débris..." /></div>
      </div>

      <div style="margin-top:10px">
        <label>Détails</label>
        <textarea name="message" required placeholder="Décrivez les items + étage + accès..."></textarea>
      </div>

      <button class="btn green" type="submit" style="width:100%;margin-top:12px;border-radius:16px">
        Envoyer
      </button>
    </form>

    <div class="footer">
      © <span id="y"></span> Ramassage Débarras Déchets — Montréal • <a href="tel:15144464684">514-446-4684</a>
    </div>
  </div>

</div>

<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
